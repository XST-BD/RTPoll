version: '3.9'

services:
  app: 
    build:
      context: ./
      dockerfile: docker/backend/DockerFile
    container_name: rtpoll-backend
    privileged: true
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: 
      uvicorn main:app --host 0.0.0.0 --port 8000 

  redis:
    image: redis:7 
    container_name: rtpoll-redis 
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data: