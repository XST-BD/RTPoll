services:

  backend: 
    build:
      context: ./
      dockerfile: docker/DockerFile
    container_name: rtpoll-backend
    privileged: true
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    command: 
      uvicorn main:app --host 0.0.0.0 --port 8000 
    volumes:
      - ./backend/data:/app/data

  redis:
    container_name: rtpoll-redis 
    image: redis:7 
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq: 
    container_name: rtpoll-rmq 
    image: "rabbitmq:3-management"
    ports:
      - "5672:5672"
      - "15672:15672"

  celery-worker:
    build:
      context: ./
      dockerfile: docker/DockerFile
    container_name: rtpoll-celery-worker
    environment:
    - PYTHONPATH=/app
    command: celery -A app.setup.worker:celery_app worker -l info
    depends_on:
      - redis
      - backend
    volumes:
      - ./backend/data:/app/data

  celery-beat:
    build:
      context: ./
      dockerfile: docker/DockerFile
    container_name: rtpoll-celery-beat
    environment:
    - PYTHONPATH=/app
    command: celery -A app.setup.worker:celery_app beat -l info
    depends_on:
      - redis
      - backend
    volumes:
      - ./backend/data:/app/data

  database:
    container_name: rtpoll-psql
    image: postgres:16
    restart: unless-stopped
    ports:
      - "127.0.0.1:5434:5432"
    env_file:
    - ./backend/.env
    volumes:
    - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d rtpoll_psql_db -U rtpoll-admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    container_name: rtpoll-nginx
    image: nginx:stable
    ports:
      - "80:80"      # HTTP
      - "443:443"    # HTTPS
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend


volumes:
  postgres_data:
  redis_data:
  nginx_certs:

