services:

  backend: 
    build:
      context: ./
      dockerfile: docker/DockerFile
    container_name: rtpoll-backend
    privileged: true
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_started
      database:
        condition: service_healthy
    command: 
      uvicorn main:app --host 0.0.0.0 --port 8000 
    volumes:
      - ./backend/data:/app/data

  redis:
    container_name: rtpoll-redis 
    image: redis:7 
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  
  database:
    container_name: rtpoll_psql
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5434:5432"
    env_file:
    - ./backend/.env
    volumes:
    - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s


volumes:
  postgres_data:
  redis_data:
