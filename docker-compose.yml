services:

  backend: 
    build:
      context: ./
      dockerfile: docker/backend/DockerFile
    privileged: true
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    command: 
      uvicorn main:app --host 0.0.0.0 --port 8000 
    volumes:
      - ./backend/data:/app/data

  redis:
    image: redis:7 
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    
  rabbitmq: 
    image: "rabbitmq:3-management"
    ports:
      - "5672:5672"
      - "15672:15672"
  
volumes:
  redis_data:
  nginx_certs:

