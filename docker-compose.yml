version: '3.9'

services:
  backend: 
    build:
      context: ./
      dockerfile: docker/backend/DockerFile
    container_name: rtpoll-backend
    privileged: true
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    command: 
      uvicorn main:app --host 0.0.0.0 --port 8000 

  frontend: 
    build: 
      context: ./
      dockerfile: docker/frontend/DockerFile
    container_name: rtpoll-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    command: 
      npm run dev

  redis:
    image: redis:7 
    container_name: rtpoll-redis 
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq: 
    image: "rabbitmq:3-management"
    container_name: rtpoll-rmq 
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  redis_data: