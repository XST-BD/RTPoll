name: Render keep-alive

on: 
  schedule: 
    - cron: '*/10 * * * *' # Runs every 10 minutes
  workflow_dispatch: # manual trigger for testing

jobs: 
  ping: 
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
    run: |
          curl -s -o /dev/null -w "%{http_code}" https://rtpoll.onrender.com/

