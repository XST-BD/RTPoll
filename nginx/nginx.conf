worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Docker DNS resolver
    resolver 127.0.0.11 valid=30s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        return 301 https://$host$request_uri; # Force HTTPS redirection
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name localhost; # Replace with your domain name

        ssl_certificate /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;
        # Modern TLS only (good even for local)
        ssl_protocols TLSv1.2 TLSv1.3;

        # WSS and HTTPS proxy configuration
        location / {
            proxy_pass http://backend:8000; # Use the service name and port of your backend container
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support headers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 3600;
        }

        # Optional: Specific location block for WSS only if needed (e.g., /ws)
        # location /ws {
        #     proxy_pass http://backend:your-websocket-port;
        #     proxy_http_version 1.1;
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection "Upgrade";
        #     proxy_set_header Host $http_host;
        # }
    }
}
