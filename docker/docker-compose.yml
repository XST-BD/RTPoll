version: '3.9'

services:
  backend: 
    build: ./backend
    container_name: rtpoll-backend
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379 

  redis:
    image: redis:7 
    container_name: rtpoll-redis 
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data: